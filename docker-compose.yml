services:
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: placement_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./server
    ports:
      - "8081:8080"
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: placement_tracker
      DB_USER: postgres
      DB_PASS: password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ML_SERVICE_URL: http://ml-service:8000

  ml-service:
    build: ./ml-service
    ports:
      - "8000:8000"

  frontend:
    build: 
      context: ./client
      args:
        - VITE_API_URL=http://localhost:8081
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
